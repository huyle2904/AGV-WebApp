version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: src/NewAGV.Api/Dockerfile
    ports:
      - "5222:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Integration__WorkerBaseUrl: http://worker:8080

  web:
    build:
      context: .
      dockerfile: src/NewAGV.Web/Dockerfile
    ports:
      - "5209:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Api__BaseUrl: http://api:8080
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: src/NewAGV.Worker/Dockerfile
    ports:
      - "5230:8080"
    environment:
      DOTNET_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      SeerRobot__ApiBaseUrl: http://api:8080
      SeerRobot__Host: 192.168.5.102
    depends_on:
      - api

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agv
      POSTGRES_PASSWORD: agv
      POSTGRES_DB: agv
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
